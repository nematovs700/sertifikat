<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>B2 Management – Umra Yo'llanmasi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(145deg, #e8f5e9, #f1f8e9);
  min-height: 100vh;
  padding: 24px 16px 40px;
}

/* ── PANEL ─────────────────────────── */
.panel {
  max-width: 980px;
  margin: 0 auto 24px;
  background: white;
  border-radius: 18px;
  padding: 28px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.ph {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 22px; padding-bottom: 20px;
  border-bottom: 2px solid #e8f5e9;
}
.ph-logo {
  height: 52px;
  width: auto;
  flex-shrink: 0;
  object-fit: contain;
}
.ph h1 { font-size: 20px; color: #1B5E20; font-weight: 700; }
.ph p  { font-size: 13px; color: #777; margin-top: 3px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 160px;
  gap: 18px; margin-bottom: 18px;
}
.fg label {
  display: block; font-size: 12px; font-weight: 700; color: #555;
  text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px;
}
.fg input, .fg textarea {
  width: 100%; padding: 13px 16px;
  border: 2px solid #e0e0e0; border-radius: 10px;
  font-size: 16px; font-family: inherit; color: #222;
  background: #fafafa; transition: .2s;
}
.fg textarea {
  resize: none; line-height: 1.5;
  min-height: 70px;
}
.fg input:focus, .fg textarea:focus {
  outline: none; border-color: #1B5E20;
  box-shadow: 0 0 0 4px rgba(27,94,32,.1);
  background: white;
}

.btn-group {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 10px; padding: 0 24px; height: 56px;
  border: none; border-radius: 14px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all .22s;
  position: relative; overflow: hidden;
  letter-spacing: .3px;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background .2s;
}
.btn:hover::after { background: rgba(255,255,255,.1); }
.btn:active { transform: scale(.97); }

.btn-png {
  background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 60%, #388E3C 100%);
  color: white;
  box-shadow: 0 4px 16px rgba(27,94,32,.35), inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-png:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(27,94,32,.45), inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-png .btn-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.btn-label { display: flex; flex-direction: column; align-items: flex-start; }
.btn-label span { font-size: 13px; font-weight: 700; line-height: 1; }
.btn-label small { font-size: 11px; font-weight: 500; opacity: .8; margin-top: 2px; }

.tip { margin-top: 20px; font-size: 12px; color: #888; }

.size-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.size-row label {
  font-size: 12px; font-weight: 700; color: #555;
  text-transform: uppercase; letter-spacing: .7px;
  white-space: nowrap;
}
.btn-sz {
  padding: 8px 16px; border: 2px solid #1B5E20; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; background: white; color: #1B5E20;
  transition: all .15s; line-height: 1;
}
.btn-sz:hover { background: #1B5E20; color: white; }
.btn-sz-reset { border-color: #aaa; color: #555; }
.btn-sz-reset:hover { background: #555; color: white; border-color: #555; }
#sizeVal {
  min-width: 38px; text-align: center;
  font-size: 15px; font-weight: 700; color: #1B5E20;
}

/* ── CERTIFICATE WRAPPER ────────────── */
.cert-outer {
  max-width: 980px; margin: 0 auto;
  border-radius: 12px; overflow: hidden;
  box-shadow: 0 14px 52px rgba(0,0,0,.2);
  background: #000;
}

/* ── CERTIFICATE ─────────────────────
   Image aspect ratio: 6250 / 4419 ≈ 1.4145
   Container always 100% width, height auto via padding-top trick
*/
.cert-wrap {
  position: relative;
  width: 100%;
  padding-top: calc(100% * 4419 / 6250); /* maintains aspect ratio */
}

.cert-wrap img.bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
  object-fit: cover;
}

.ov-name {
  position: absolute;
  top: 36%;
  left: 0; right: 0;
  text-align: center;
  transform: translateY(-50%);

  font-family: 'Baskerville Display PT', 'Libre Baskerville', 'Baskerville', Georgia, serif;
  font-weight: 700;
  font-size: var(--name-size, 3.06cqi);
  color: #2e5033;
  text-transform: uppercase;
  white-space: pre;
  letter-spacing: 0.07em;
  line-height: 1.35;
}

.ov-year {
  position: absolute;
  top: 92.5%;
  left: 38.7%;
  transform: translate(-50%, -50%);

  font-family: 'Libre Baskerville', 'Baskerville', Georgia, serif;
  font-weight: 700;
  font-size: 1.53cqi;
  color: #ffffff !important;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

.cert-wrap { container-type: inline-size; }

/* ── MOBILE ──────────────────────────── */
@media (max-width: 600px) {
  body { padding: 10px 8px 24px; }

  .panel { padding: 16px 14px; border-radius: 14px; margin-bottom: 14px; }

  .ph { gap: 10px; margin-bottom: 14px; padding-bottom: 12px; }
  .ph-logo { height: 36px; }
  .ph h1 { font-size: 14px; line-height: 1.3; }
  .ph p  { font-size: 11px; }

  .form-row {
    grid-template-columns: 1fr;
    gap: 10px; margin-bottom: 10px;
  }
  .fg label { font-size: 11px; margin-bottom: 6px; }
  .fg input { padding: 12px 12px; font-size: 15px; border-radius: 9px; }

  /* Size row: label full width, buttons stretch */
  .size-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
  }
  .size-row label { grid-column: 1 / -1; font-size: 11px; margin-bottom: 0; }
  .btn-sz { padding: 9px 10px; font-size: 13px; text-align: center; }
  #sizeVal { font-size: 13px; min-width: 44px; }

  /* Stack download buttons vertically */
  .btn-group { grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
  .btn { height: 54px; font-size: 15px; border-radius: 13px; gap: 12px; }
  .btn-icon { width: 34px !important; height: 34px !important; border-radius: 8px !important; }
  .btn-label span { font-size: 13px; }
  .btn-label small { font-size: 11px; }

  .tip { font-size: 11px; margin-top: 8px; }

  .cert-outer { border-radius: 8px; }
}

/* ── PRINT ───────────────────────────── */
@media print {
  body { background: white; padding: 0; }
  .panel { display: none !important; }
  .cert-outer {
    max-width: none; border-radius: 0; box-shadow: none;
    margin: 0;
  }
  @page { size: A4 landscape; margin: 0; }
}
</style>
</head>
<body>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="ph">
    <img src="logo.png" alt="Etihad Paketlari" class="ph-logo">
    <div>
      <h1>Umra Yo'llanmasi Generator</h1>
      <p>B2 Management · Sertifikat tayyorlash tizimi</p>
    </div>
  </div>

  <div class="form-row">
    <div class="fg">
      <label>Mijoz ismi (to'liq — katta harflarda, Enter — yangi qator)</label>
      <textarea id="nameInput" rows="2"
             placeholder="FAMILIYA ISM OTASINING ISMI"
             oninput="updateName(this.value)">NEMATOV AMR</textarea>
    </div>
    <div class="fg">
      <label>Yil</label>
      <input type="number" id="yearInput" value="2026" min="2024" max="2035"
             oninput="document.getElementById('certYear').textContent = this.value || '2026'">
    </div>
  </div>

  <div class="size-row">
    <label>Ism o'lchami:</label>
    <button class="btn-sz" onclick="changeSize(-1)">− Kichraytirish</button>
    <span id="sizeVal">30 px</span>
    <button class="btn-sz" onclick="changeSize(1)">+ Kattalashtirish</button>
    <button class="btn-sz btn-sz-reset" onclick="changeSize(0)">↺ 30px</button>
  </div>

  <div class="btn-group">
    <button class="btn btn-png" onclick="downloadPng()">
      <div class="btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="btn-label">
        <span>PNG saqlash</span>
        <small>Rasm formatida</small>
      </div>
    </button>
  </div>
  <p class="tip" id="dlTip"></p>
</div>

<!-- CERTIFICATE -->
<div class="cert-outer">
  <div class="cert-wrap">
    <!-- Background image (actual certificate design) -->
    <img class="bg" src="certificate-bg.png" alt="Umra Yo'llanmasi">

    <!-- Editable: Name -->
    <div class="ov-name" id="certName">NEMATOV AMR</div>

    <!-- Editable: Year -->
    <div class="ov-year" id="certYear">2026</div>
  </div>
</div>

<script>
var nameSize = 30;

function updateName(val) {
  var upper = val.toUpperCase() || 'FAMILIYA ISM';
  document.getElementById('certName').textContent = upper;
  var lines = upper.split('\n').filter(function(l){ return l.trim(); }).length;
  document.getElementById('certName').style.top = (lines >= 2 ? '33%' : '36%');
}

function changeSize(delta) {
  if (delta === 0) { nameSize = 30; }
  else { nameSize = Math.min(60, Math.max(8, nameSize + delta)); }
  var cqi = (nameSize / 980 * 100).toFixed(3);
  document.querySelector('.cert-wrap').style.setProperty('--name-size', cqi + 'cqi');
  document.getElementById('sizeVal').textContent = nameSize + ' px';
}

function buildCanvas(callback) {
  var rawText = document.getElementById('nameInput').value.trim() || 'SERTIFIKAT';
  var lines   = rawText.toUpperCase().split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  var yearText = document.getElementById('certYear').textContent.trim() || '2026';

  var imgW = 3500;
  var imgH = Math.round(imgW * 4419 / 6250);
  var scale = imgW / 980;

  var canvas = document.createElement('canvas');
  canvas.width  = imgW;
  canvas.height = imgH;
  var ctx = canvas.getContext('2d');

  var bg = new Image();
  bg.onload = function() {
    ctx.drawImage(bg, 0, 0, imgW, imgH);

    var namePx   = Math.round(nameSize * scale);
    var lineH    = Math.round(namePx * 1.35);
    var totalH   = lineH * lines.length;
    var centerY  = imgH * (lines.length >= 2 ? 0.33 : 0.36);
    var startY   = centerY - totalH / 2 + namePx / 2;

    ctx.save();
    ctx.font         = 'bold ' + namePx + 'px "Baskerville Display PT","Libre Baskerville",Georgia,serif';
    ctx.fillStyle    = '#2e5033';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    try { ctx.letterSpacing = Math.round(namePx * 0.07) + 'px'; } catch(e) {}
    lines.forEach(function(line, i) {
      ctx.fillText(line, imgW / 2, startY + i * lineH);
    });
    ctx.restore();

    var yearPx = Math.round(15 * scale);
    ctx.save();
    ctx.font         = 'bold ' + yearPx + 'px "Libre Baskerville",Georgia,serif';
    ctx.fillStyle    = '#ffffff';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    try { ctx.letterSpacing = Math.round(yearPx * 0.06) + 'px'; } catch(e) {}
    ctx.fillText(yearText, imgW * 0.387, imgH * 0.925);
    ctx.restore();

    callback(canvas, lines[0] || 'SERTIFIKAT');
  };
  bg.onerror = function() {
    document.getElementById('dlTip').textContent = '❌ certificate-bg.png topilmadi.';
  };
  bg.src = 'certificate-bg.png';
}

function downloadPng() {
  var tip = document.getElementById('dlTip');
  tip.textContent = '⏳ Tayyorlanmoqda...';

  buildCanvas(function(canvas, nameText) {
    canvas.toBlob(function(blob) {
      var url  = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.download = nameText + '.png';
      link.href = url;
      link.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
      tip.textContent = '✅ Yuklandi: ' + link.download;
    }, 'image/png');
  });
}
</script>
</body>
</html>
